<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        /* Кнопка показа/скрытия меню */
        .toggle-menu-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 200;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            border: 1px solid #f39c12;
            border-radius: 50px;
            padding: 10px 18px;
            color: #f39c12;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Segoe UI', system-ui, sans-serif;
            transition: all 0.2s;
        }

        .toggle-menu-btn:hover {
            background: #f39c12;
            color: black;
        }

        /* Кнопка закрепления объекта */
        .pin-object-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 200;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            border: 1px solid #4ecdc4;
            border-radius: 50px;
            padding: 10px 18px;
            color: #4ecdc4;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Segoe UI', system-ui, sans-serif;
            transition: all 0.2s;
        }

        .pin-object-btn.pinned {
            background: #4ecdc4;
            color: black;
            border-color: white;
        }

        .pin-object-btn:hover {
            background: #4ecdc4;
            color: black;
        }

        /* Панель выбора блюд */
        .menu-panel {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 12px 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            max-width: 95%;
            border: 1px solid rgba(255,255,255,0.2);
            font-family: 'Segoe UI', system-ui, sans-serif;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        .menu-panel.hidden {
            transform: translateX(-50%) translateY(120%);
            opacity: 0;
            pointer-events: none;
        }

        .menu-btn {
            background: linear-gradient(135deg, #2c3e50, #1a1a2e);
            border: none;
            color: white;
            padding: 8px 14px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.15);
        }

        .menu-btn:hover {
            transform: scale(1.05);
            background: linear-gradient(135deg, #e67e22, #f39c12);
        }

        .menu-btn.active {
            background: linear-gradient(135deg, #e67e22, #f39c12);
            box-shadow: 0 0 12px rgba(230,126,34,0.5);
        }

        /* Инфо-панель с БЖУ */
        .info-card {
            position: fixed;
            top: 70px;
            left: 20px;
            z-index: 100;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 12px 18px;
            color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            max-width: 260px;
            border-left: 4px solid #f39c12;
            pointer-events: none;
        }

        .info-card h3 {
            font-size: 16px;
            margin-bottom: 6px;
            color: #f39c12;
        }

        .info-card .calories {
            font-size: 22px;
            font-weight: bold;
            margin: 6px 0;
        }

        .info-card .calories span {
            font-size: 12px;
            font-weight: normal;
            color: #aaa;
        }

        .info-card .macro {
            font-size: 12px;
            display: flex;
            gap: 12px;
            margin: 8px 0;
        }

        .info-card .macro div {
            background: rgba(255,255,255,0.1);
            padding: 3px 8px;
            border-radius: 20px;
        }

        .info-card .ingredients {
            font-size: 11px;
            color: #ccc;
            margin-top: 6px;
            line-height: 1.4;
        }

        .badge {
            position: fixed;
            bottom: 10px;
            right: 10px;
            z-index: 100;
            background: rgba(0,0,0,0.5);
            color: white;
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 8px;
            font-family: monospace;
        }

        .warning {
            position: fixed;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: rgba(0,0,0,0.7);
            color: #ffaa00;
            font-size: 11px;
            padding: 5px 12px;
            border-radius: 20px;
            font-family: monospace;
            white-space: nowrap;
            pointer-events: none;
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <!-- Кнопка скрытия/показа меню -->
    <button class="toggle-menu-btn" id="toggleMenuBtn">🙈 Скрыть меню</button>

    <!-- Кнопка закрепления объекта -->
    <button class="pin-object-btn" id="pinObjectBtn">📍 Закрепить</button>

    <!-- Инфо-панель -->
    <div class="info-card" id="infoCard">
        <h3 id="dishName">🍔 Бургер</h3>
        <div class="calories" id="calories">450 <span>ккал</span></div>
        <div class="macro" id="macro">
            <div>🥩 Б: 25г</div>
            <div>🧈 Ж: 22г</div>
            <div>🍚 У: 35г</div>
        </div>
        <div class="ingredients" id="ingredients">
            Состав: говяжья котлета, сыр чеддер, салат, помидор, соус BBQ
        </div>
    </div>

    <!-- Панель выбора блюд -->
    <div class="menu-panel" id="menuPanel">
        <button class="menu-btn" data-dish="burger">🍔 Бургер</button>
        <button class="menu-btn" data-dish="pizza">🍕 Пицца</button>
        <button class="menu-btn" data-dish="sushi">🍣 Роллы</button>
        <button class="menu-btn" data-dish="salad">🥗 Цезарь</button>
        <button class="menu-btn" data-dish="pasta">🍝 Карбонара</button>
        <button class="menu-btn" data-dish="steak">🥩 Стейк</button>
        <button class="menu-btn" data-dish="bowl">🥣 Йогурт</button>
        <button class="menu-btn" data-dish="coffee">☕ Латте</button>
        <button class="menu-btn" data-dish="donut">🍩 Пончик</button>
        <button class="menu-btn" data-dish="icecream">🍦 Пломбир</button>
    </div>

    <div class="badge">AR Menu • Наведи на маркер Hiro</div>
    <div class="warning" id="warningMsg">💡 Води пальцем по экрану, чтобы перемещать блюдо</div>

    <!-- AR СЦЕНА -->
    <a-scene id="arScene" embedded arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono;">
        
        <!-- Маркер -->
        <a-marker id="hiroMarker" preset="hiro">
            
            <!-- 3D-графика внутри маркера -->
            <a-entity id="dishModel" position="0 0.5 0">
                <!-- Бургер -->
                <a-group id="burgerGroup">
                    <a-cylinder color="#D2691E" radius="0.45" height="0.12" position="0 0 0"></a-cylinder>
                    <a-cylinder color="#8B4513" radius="0.46" height="0.08" position="0 0.08 0"></a-cylinder>
                    <a-cylinder color="#228B22" radius="0.44" height="0.05" position="0 0.16 0"></a-cylinder>
                    <a-torus radius="0.44" radius-tubular="0.04" color="#FF6347" position="0 0.21 0"></a-torus>
                    <a-cylinder color="#F4A460" radius="0.44" height="0.07" position="0 0.25 0"></a-cylinder>
                    <a-cylinder color="#D2691E" radius="0.46" height="0.1" position="0 0.32 0"></a-cylinder>
                    <a-sphere color="#FFD700" radius="0.08" position="0 0.38 0"></a-sphere>
                </a-group>
                <a-box id="pizzaModel" position="0 0.1 0" width="0.9" height="0.1" depth="0.9" color="#E67E22" visible="false"></a-box>
                <a-box id="sushiModel" position="0 0.15 0" width="0.6" height="0.1" depth="0.4" color="#F5DEB3" visible="false"></a-box>
                <a-box id="saladModel" position="0 0.2 0" width="0.7" height="0.15" depth="0.7" color="#32CD32" visible="false"></a-box>
                <a-box id="pastaModel" position="0 0.1 0" width="0.6" height="0.12" depth="0.6" color="#FFD700" visible="false"></a-box>
                <a-box id="steakModel" position="0 0.1 0" width="0.6" height="0.08" depth="0.5" color="#8B0000" visible="false"></a-box>
                <a-box id="bowlModel" position="0 0.1 0" width="0.5" height="0.12" depth="0.5" color="#F0F8FF" visible="false"></a-box>
                <a-box id="coffeeModel" position="0 0.15 0" width="0.35" height="0.2" depth="0.35" color="#6F4E37" visible="false"></a-box>
                <a-box id="donutModel" position="0 0.1 0" width="0.5" height="0.1" depth="0.5" color="#FFB6C1" visible="false"></a-box>
                <a-box id="icecreamModel" position="0 0.2 0" width="0.4" height="0.25" depth="0.4" color="#FFFACD" visible="false"></a-box>
            </a-entity>

            <a-text id="dishText" value="🍔 Бургер" position="0 -0.3 0" color="white" scale="0.8 0.8 0.8" align="center" background="true" background-color="black" background-padding="0.2"></a-text>
        </a-marker>

        <!-- Закреплённая группа -->
        <a-entity id="pinnedGroup" position="0 0 0" visible="false">
            <a-entity id="pinnedModel" position="0 0.5 0"></a-entity>
            <a-text id="pinnedText" value="" position="0 -0.3 0" color="white" scale="0.8 0.8 0.8" align="center" background="true" background-color="black" background-padding="0.2"></a-text>
        </a-entity>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        // БАЗА ДАННЫХ БЛЮД
        const dishes = {
            burger: { name: "🍔 Чизбургер", calories: "520", protein: "28", fat: "26", carbs: "42", ingredients: "Говяжья котлета 150г, сыр чеддер, салат айсберг, помидор, маринованные огурцы, соус BBQ, булка с кунжутом" },
            pizza: { name: "🍕 Пицца Маргарита", calories: "680", protein: "24", fat: "28", carbs: "75", ingredients: "Томатный соус, моцарелла, свежие томаты, базилик, оливковое масло, тесто на закваске" },
            sushi: { name: "🍣 Роллы Филадельфия", calories: "380", protein: "18", fat: "16", carbs: "42", ingredients: "Рис, норвежский лосось, сливочный сыр, огурец, авокадо, нори, кунжут" },
            salad: { name: "🥗 Цезарь с курицей", calories: "410", protein: "32", fat: "24", carbs: "18", ingredients: "Куриное филе, салат романо, пармезан, сухарики, соус Цезарь, перепелиное яйцо" },
            pasta: { name: "🍝 Паста Карбонара", calories: "720", protein: "26", fat: "34", carbs: "72", ingredients: "Спагетти, гуанчиале, яйцо, пекорино романо, чёрный перец, пармезан" },
            steak: { name: "🥩 Стейк Рибай", calories: "890", protein: "52", fat: "68", carbs: "2", ingredients: "Мраморная говядина (250г), розмарин, тимьян, чеснок, сливочное масло, трюфельный соус" },
            bowl: { name: "🥣 Греческий йогурт с гранолой", calories: "320", protein: "15", fat: "12", carbs: "38", ingredients: "Натуральный йогурт 5%, гранола, свежие ягоды, мёд, семена чиа" },
            coffee: { name: "☕ Латте", calories: "180", protein: "8", fat: "9", carbs: "14", ingredients: "Эспрессо, вспененное молоко 3.2%, сироп (по желанию), корица" },
            donut: { name: "🍩 Пончик глазированный", calories: "350", protein: "5", fat: "18", carbs: "44", ingredients: "Дрожжевое тесто, шоколадная глазурь, кондитерская посыпка" },
            icecream: { name: "🍦 Пломбир ванильный", calories: "220", protein: "4", fat: "14", carbs: "20", ingredients: "Натуральные сливки 33%, яичный желток, сахар, ванильный стручок" }
        };

        // Элементы
        const infoCard = document.getElementById('infoCard');
        const dishNameEl = document.getElementById('dishName');
        const caloriesEl = document.getElementById('calories');
        const macroEl = document.getElementById('macro');
        const ingredientsEl = document.getElementById('ingredients');
        const menuPanel = document.getElementById('menuPanel');
        const toggleBtn = document.getElementById('toggleMenuBtn');
        const pinBtn = document.getElementById('pinObjectBtn');
        const hiroMarker = document.getElementById('hiroMarker');
        const pinnedGroup = document.getElementById('pinnedGroup');
        const dishText = document.getElementById('dishText');
        const pinnedText = document.getElementById('pinnedText');

        // Модели
        const models = {
            burger: document.getElementById('burgerGroup'),
            pizza: document.getElementById('pizzaModel'),
            sushi: document.getElementById('sushiModel'),
            salad: document.getElementById('saladModel'),
            pasta: document.getElementById('pastaModel'),
            steak: document.getElementById('steakModel'),
            bowl: document.getElementById('bowlModel'),
            coffee: document.getElementById('coffeeModel'),
            donut: document.getElementById('donutModel'),
            icecream: document.getElementById('icecreamModel')
        };

        const pinnedModels = {};
        for (let key in models) {
            if (models[key]) {
                const clone = models[key].cloneNode(true);
                clone.setAttribute('visible', false);
                document.getElementById('pinnedModel').appendChild(clone);
                pinnedModels[key] = clone;
            }
        }

        let currentDish = 'burger';
        let isPinned = false;
        let isDragging = false;
        let lastTouchX = 0;
        let lastTouchY = 0;

        function selectDish(dishId) {
            currentDish = dishId;
            const dish = dishes[dishId];
            if (!dish) return;

            dishNameEl.textContent = dish.name;
            caloriesEl.innerHTML = `${dish.calories} <span>ккал</span>`;
            macroEl.innerHTML = `<div>🥩 Б: ${dish.protein}г</div><div>🧈 Ж: ${dish.fat}г</div><div>🍚 У: ${dish.carbs}г</div>`;
            ingredientsEl.textContent = `Состав: ${dish.ingredients}`;
            
            dishText.setAttribute('value', dish.name);
            
            for (let key in models) {
                if (models[key]) models[key].setAttribute('visible', 'false');
            }
            if (models[dishId]) models[dishId].setAttribute('visible', 'true');
            
            if (isPinned) {
                for (let key in pinnedModels) {
                    if (pinnedModels[key]) pinnedModels[key].setAttribute('visible', 'false');
                }
                if (pinnedModels[dishId]) pinnedModels[dishId].setAttribute('visible', 'true');
                pinnedText.setAttribute('value', dish.name);
            }
            
            document.querySelectorAll('.menu-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.dish === dishId) btn.classList.add('active');
            });
        }

        // Перемещение пальцем (автоматически, без кнопок)
        function startDrag(e) {
            isDragging = true;
            const touch = e.touches[0];
            lastTouchX = touch.clientX;
            lastTouchY = touch.clientY;
            e.preventDefault();
        }

        function onDrag(e) {
            if (!isDragging) return;
            const touch = e.touches[0];
            const deltaX = (touch.clientX - lastTouchX) * 0.005;
            const deltaY = (touch.clientY - lastTouchY) * 0.005;
            
            if (isPinned && pinnedGroup.getAttribute('visible') === 'true') {
                let pos = pinnedGroup.getAttribute('position');
                pinnedGroup.setAttribute('position', {
                    x: pos.x + deltaX,
                    y: pos.y - deltaY,
                    z: pos.z
                });
            } else if (hiroMarker.getAttribute('visible') === 'true') {
                let pos = hiroMarker.getAttribute('position');
                hiroMarker.setAttribute('position', {
                    x: pos.x + deltaX,
                    y: pos.y - deltaY,
                    z: pos.z
                });
            }
            
            lastTouchX = touch.clientX;
            lastTouchY = touch.clientY;
            e.preventDefault();
        }

        function endDrag(e) {
            isDragging = false;
            e.preventDefault();
        }

        function pinObject() {
            if (!isPinned) {
                const markerPosition = hiroMarker.object3D.position;
                const markerRotation = hiroMarker.object3D.rotation;
                
                pinnedGroup.object3D.position.copy(markerPosition);
                pinnedGroup.object3D.rotation.copy(markerRotation);
                
                for (let key in pinnedModels) {
                    pinnedModels[key].setAttribute('visible', 'false');
                }
                if (pinnedModels[currentDish]) {
                    pinnedModels[currentDish].setAttribute('visible', 'true');
                }
                pinnedText.setAttribute('value', dishes[currentDish].name);
                
                pinnedGroup.setAttribute('visible', 'true');
                hiroMarker.setAttribute('visible', 'false');
                
                isPinned = true;
                pinBtn.textContent = '📍 Открепить';
                pinBtn.classList.add('pinned');
                document.getElementById('warningMsg').textContent = '✅ Объект закреплён! Теперь можно убрать маркер. Води пальцем — перемещай!';
                setTimeout(() => {
                    document.getElementById('warningMsg').style.opacity = '0.5';
                }, 3000);
            } else {
                pinnedGroup.setAttribute('visible', 'false');
                hiroMarker.setAttribute('visible', 'true');
                isPinned = false;
                pinBtn.textContent = '📍 Закрепить';
                pinBtn.classList.remove('pinned');
                document.getElementById('warningMsg').textContent = '💡 Води пальцем по экрану, чтобы перемещать блюдо';
                document.getElementById('warningMsg').style.opacity = '1';
            }
        }

        let menuHidden = false;
        toggleBtn.onclick = () => {
            menuHidden = !menuHidden;
            if (menuHidden) {
                menuPanel.classList.add('hidden');
                toggleBtn.innerHTML = '🙉 Показать меню';
            } else {
                menuPanel.classList.remove('hidden');
                toggleBtn.innerHTML = '🙈 Скрыть меню';
            }
        };

        document.querySelectorAll('.menu-btn').forEach(btn => {
            btn.addEventListener('click', () => selectDish(btn.dataset.dish));
        });

        pinBtn.onclick = pinObject;

        selectDish('burger');
        
        // Автоматическое перемещение без кнопок
        document.addEventListener('touchstart', startDrag, { passive: false });
        document.addEventListener('touchmove', onDrag, { passive: false });
        document.addEventListener('touchend', endDrag);
        
        setInterval(() => {
            if (!isPinned && hiroMarker.object3D && pinnedGroup) {
                const pos = hiroMarker.object3D.position;
                const rot = hiroMarker.object3D.rotation;
                if (pos && (pos.x !== 0 || pos.y !== 0 || pos.z !== 0)) {
                    pinnedGroup.object3D.position.copy(pos);
                    pinnedGroup.object3D.rotation.copy(rot);
                }
            }
        }, 100);
    </script>
</body>
</html>
