<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>AR Menu</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
            background: #000;
        }

        /* ===== ВЕРХНЯЯ ПАНЕЛЬ ===== */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 300;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            padding-top: max(12px, env(safe-area-inset-top));
            background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 100%);
            pointer-events: none;
        }

        .top-bar > * {
            pointer-events: auto;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            color: white;
            font-weight: 700;
            font-size: 18px;
            letter-spacing: -0.5px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #FF6B35, #F7C948);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            box-shadow: 0 4px 15px rgba(255,107,53,0.4);
        }

        .top-actions {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            border: none;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: white;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .icon-btn:active {
            transform: scale(0.9);
            background: rgba(255,255,255,0.25);
        }

        .icon-btn.active {
            background: linear-gradient(135deg, #FF6B35, #F7C948);
            box-shadow: 0 4px 15px rgba(255,107,53,0.4);
        }

        /* ===== ИНФО-КАРТОЧКА ===== */
        .info-card {
            position: fixed;
            top: 80px;
            top: calc(max(12px, env(safe-area-inset-top)) + 56px);
            left: 16px;
            right: 16px;
            z-index: 250;
            background: rgba(20, 20, 30, 0.85);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 20px;
            padding: 20px;
            color: white;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            max-width: 380px;
        }

        .info-card.collapsed {
            transform: translateY(-10px);
            opacity: 0;
            pointer-events: none;
        }

        .dish-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .dish-name {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.3px;
            line-height: 1.2;
        }

        .dish-emoji {
            font-size: 32px;
            line-height: 1;
        }

        .calories-row {
            display: flex;
            align-items: baseline;
            gap: 4px;
            margin-bottom: 16px;
        }

        .cal-number {
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(135deg, #FF6B35, #F7C948);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
        }

        .cal-unit {
            font-size: 14px;
            color: rgba(255,255,255,0.4);
            font-weight: 500;
        }

        .macros {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 14px;
        }

        .macro-item {
            background: rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.04);
        }

        .macro-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.35);
            margin-bottom: 4px;
        }

        .macro-value {
            font-size: 18px;
            font-weight: 700;
        }

        .macro-value.protein { color: #4ECDC4; }
        .macro-value.fat { color: #FFE66D; }
        .macro-value.carbs { color: #FF6B6B; }

        .macro-unit {
            font-size: 11px;
            font-weight: 400;
            opacity: 0.5;
        }

        .ingredients-section {
            padding-top: 14px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }

        .ingredients-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.3);
            margin-bottom: 6px;
        }

        .ingredients-text {
            font-size: 13px;
            color: rgba(255,255,255,0.6);
            line-height: 1.5;
            font-weight: 300;
        }

        /* ===== НИЖНЕЕ МЕНЮ ===== */
        .bottom-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 300;
            padding-bottom: max(16px, env(safe-area-inset-bottom));
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .bottom-sheet.hidden {
            transform: translateY(100%);
        }

        .sheet-handle {
            width: 36px;
            height: 4px;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
            margin: 0 auto 10px;
        }

        .menu-scroll {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 0 16px 8px;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .menu-scroll::-webkit-scrollbar {
            display: none;
        }

        .dish-card {
            flex-shrink: 0;
            scroll-snap-align: start;
            width: 100px;
            background: rgba(20, 20, 30, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 18px;
            padding: 14px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .dish-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 16px;
            background: linear-gradient(135deg, rgba(255,107,53,0.15), rgba(247,201,72,0.15));
            opacity: 0;
            transition: opacity 0.3s;
        }

        .dish-card:active {
            transform: scale(0.95);
        }

        .dish-card.active {
            border-color: rgba(255,107,53,0.6);
            box-shadow: 0 0 25px rgba(255,107,53,0.2);
        }

        .dish-card.active::before {
            opacity: 1;
        }

        .card-emoji {
            font-size: 30px;
            margin-bottom: 6px;
            display: block;
            position: relative;
            z-index: 1;
        }

        .card-name {
            font-size: 11px;
            color: rgba(255,255,255,0.7);
            font-weight: 500;
            position: relative;
            z-index: 1;
            line-height: 1.3;
        }

        .card-cal {
            font-size: 10px;
            color: rgba(255,255,255,0.35);
            margin-top: 4px;
            position: relative;
            z-index: 1;
        }

        .dish-card.active .card-name {
            color: white;
        }

        .dish-card.active .card-cal {
            color: rgba(255,200,100,0.7);
        }

        /* ===== ПОДСКАЗКА ===== */
        .hint-toast {
            position: fixed;
            bottom: 200px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 250;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: rgba(255,255,255,0.8);
            font-size: 13px;
            padding: 10px 20px;
            border-radius: 50px;
            white-space: nowrap;
            font-weight: 400;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid rgba(255,255,255,0.08);
        }

        .hint-toast.fade {
            opacity: 0;
            transform: translateX(-50%) translateY(10px);
            pointer-events: none;
        }

        /* ===== ПУЛЬСИРУЮЩИЙ ИНДИКАТОР КАМЕРЫ ===== */
        .cam-indicator {
            position: fixed;
            top: calc(max(12px, env(safe-area-inset-top)) + 6px);
            left: 50%;
            transform: translateX(-50%);
            z-index: 300;
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            color: rgba(255,255,255,0.5);
        }

        .cam-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #4ADE80;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(74,222,128,0.4); }
            50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(74,222,128,0); }
        }

        /* ===== АНИМАЦИЯ ЗАГРУЗКИ ===== */
        .splash {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: #0a0a0f;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.6s ease;
        }

        .splash.hide {
            opacity: 0;
            pointer-events: none;
        }

        .splash-icon {
            font-size: 56px;
            margin-bottom: 20px;
            animation: float 2s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        .splash-title {
            color: white;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .splash-sub {
            color: rgba(255,255,255,0.4);
            font-size: 14px;
            font-weight: 400;
        }

        .splash-loader {
            margin-top: 30px;
            width: 120px;
            height: 3px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        .splash-loader-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #FF6B35, #F7C948);
            border-radius: 3px;
            animation: load 2s ease-in-out forwards;
        }

        @keyframes load {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        /* AR Scene */
        #arScene {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
    </style>
</head>
<body>

    <!-- СПЛЭШ ЭКРАН -->
    <div class="splash" id="splash">
        <div class="splash-icon">🍽️</div>
        <div class="splash-title">AR Menu</div>
        <div class="splash-sub">Загрузка камеры...</div>
        <div class="splash-loader">
            <div class="splash-loader-bar"></div>
        </div>
    </div>

    <!-- ВЕРХНЯЯ ПАНЕЛЬ -->
    <div class="top-bar">
        <div class="logo">
            <div class="logo-icon">🍽</div>
            <span>AR Menu</span>
        </div>
        <div class="top-actions">
            <button class="icon-btn" id="toggleInfoBtn" title="Информация">ℹ️</button>
            <button class="icon-btn" id="pinBtn" title="Закрепить">📌</button>
            <button class="icon-btn" id="toggleMenuBtn" title="Меню">☰</button>
        </div>
    </div>

    <!-- ИНДИКАТОР КАМЕРЫ -->
    <div class="cam-indicator">
        <div class="cam-dot"></div>
        <span>Камера активна • Hiro маркер</span>
    </div>

    <!-- ИНФО-КАРТОЧКА -->
    <div class="info-card" id="infoCard">
        <div class="dish-header">
            <div>
                <div class="dish-name" id="dishName">Чизбургер</div>
            </div>
            <div class="dish-emoji" id="dishEmoji">🍔</div>
        </div>
        <div class="calories-row">
            <span class="cal-number" id="calNumber">520</span>
            <span class="cal-unit">ккал</span>
        </div>
        <div class="macros">
            <div class="macro-item">
                <div class="macro-label">Белки</div>
                <div class="macro-value protein" id="proteinVal">28<span class="macro-unit">г</span></div>
            </div>
            <div class="macro-item">
                <div class="macro-label">Жиры</div>
                <div class="macro-value fat" id="fatVal">26<span class="macro-unit">г</span></div>
            </div>
            <div class="macro-item">
                <div class="macro-label">Углев.</div>
                <div class="macro-value carbs" id="carbsVal">42<span class="macro-unit">г</span></div>
            </div>
        </div>
        <div class="ingredients-section">
            <div class="ingredients-label">Состав</div>
            <div class="ingredients-text" id="ingredientsText">Говяжья котлета 150г, сыр чеддер, салат айсберг, помидор, маринованные огурцы, соус BBQ, булка с кунжутом</div>
        </div>
    </div>

    <!-- ПОДСКАЗКА -->
    <div class="hint-toast" id="hintToast">👆 Свайпай по экрану — перемещай блюдо</div>

    <!-- НИЖНЕЕ МЕНЮ -->
    <div class="bottom-sheet" id="bottomSheet">
        <div class="sheet-handle"></div>
        <div class="menu-scroll" id="menuScroll">
            <div class="dish-card active" data-dish="burger">
                <span class="card-emoji">🍔</span>
                <div class="card-name">Бургер</div>
                <div class="card-cal">520
