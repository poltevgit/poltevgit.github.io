<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <!-- Добавляем компонент для загрузки GLTF -->
    <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        .toggle-menu-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 200;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            border: 1px solid #f39c12;
            border-radius: 50px;
            padding: 10px 18px;
            color: #f39c12;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Segoe UI', system-ui, sans-serif;
            transition: all 0.2s;
        }

        .toggle-menu-btn:hover {
            background: #f39c12;
            color: black;
        }

        .pin-object-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 200;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            border: 1px solid #4ecdc4;
            border-radius: 50px;
            padding: 10px 18px;
            color: #4ecdc4;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Segoe UI', system-ui, sans-serif;
            transition: all 0.2s;
        }

        .pin-object-btn.pinned {
            background: #4ecdc4;
            color: black;
            border-color: white;
        }

        .pin-object-btn:hover {
            background: #4ecdc4;
            color: black;
        }

        .menu-panel {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 12px 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            max-width: 95%;
            border: 1px solid rgba(255,255,255,0.2);
            font-family: 'Segoe UI', system-ui, sans-serif;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        .menu-panel.hidden {
            transform: translateX(-50%) translateY(120%);
            opacity: 0;
            pointer-events: none;
        }

        .menu-btn {
            background: linear-gradient(135deg, #2c3e50, #1a1a2e);
            border: none;
            color: white;
            padding: 8px 14px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.15);
            pointer-events: auto;
        }

        .menu-btn:hover {
            transform: scale(1.05);
            background: linear-gradient(135deg, #e67e22, #f39c12);
        }

        .menu-btn.active {
            background: linear-gradient(135deg, #e67e22, #f39c12);
            box-shadow: 0 0 12px rgba(230,126,34,0.5);
        }

        .info-card {
            position: fixed;
            top: 70px;
            left: 20px;
            z-index: 100;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 12px 18px;
            color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            max-width: 260px;
            border-left: 4px solid #f39c12;
            pointer-events: none;
        }

        .info-card h3 {
            font-size: 16px;
            margin-bottom: 6px;
            color: #f39c12;
        }

        .info-card .calories {
            font-size: 22px;
            font-weight: bold;
            margin: 6px 0;
        }

        .info-card .calories span {
            font-size: 12px;
            font-weight: normal;
            color: #aaa;
        }

        .info-card .macro {
            font-size: 12px;
            display: flex;
            gap: 12px;
            margin: 8px 0;
        }

        .info-card .macro div {
            background: rgba(255,255,255,0.1);
            padding: 3px 8px;
            border-radius: 20px;
        }

        .info-card .ingredients {
            font-size: 11px;
            color: #ccc;
            margin-top: 6px;
            line-height: 1.4;
        }

        .badge {
            position: fixed;
            bottom: 10px;
            right: 10px;
            z-index: 100;
            background: rgba(0,0,0,0.5);
            color: white;
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 8px;
            font-family: monospace;
        }

        .warning {
            position: fixed;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            color: #ffaa00;
            font-size: 12px;
            padding: 8px 16px;
            border-radius: 30px;
            font-family: 'Segoe UI', system-ui, sans-serif;
            white-space: nowrap;
            pointer-events: none;
            border: 1px solid rgba(255,170,0,0.3);
            font-weight: 500;
            transition: opacity 0.3s ease;
        }
        
        #arScene {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        .toggle-menu-btn, .pin-object-btn, .menu-panel, .info-card, .badge, .warning {
            z-index: 200;
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <button class="toggle-menu-btn" id="toggleMenuBtn">🙈 Скрыть меню</button>
    <button class="pin-object-btn" id="pinObjectBtn">📍 Закрепить</button>

    <div class="info-card" id="infoCard">
        <h3 id="dishName">🍔 Бургер</h3>
        <div class="calories" id="calories">520 <span>ккал</span></div>
        <div class="macro" id="macro">
            <div>🥩 Б: 28г</div>
            <div>🧈 Ж: 26г</div>
            <div>🍚 У: 42г</div>
        </div>
        <div class="ingredients" id="ingredients">
            Состав: говяжья котлета 150г, сыр чеддер, салат айсберг...
        </div>
    </div>

    <div class="menu-panel" id="menuPanel">
        <button class="menu-btn" data-dish="burger">🍔 Бургер</button>
        <button class="menu-btn" data-dish="pizza">🍕 Пицца</button>
        <button class="menu-btn" data-dish="coffee">☕ Латте</button>
    </div>

    <div class="badge">AR Меню • Наведи на маркер Hiro</div>
    <div class="warning" id="warningMsg">✨ Наведи камеру на маркер Hiro, чтобы начать</div>

    <a-scene id="arScene" embedded arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono;">
        
        <!-- Объявляем 3D модели GLTF (пути ведут в папку gltf) -->
        <a-assets>
            <a-asset-item id="burgerModel" src="gltf/burger.gltf"></a-asset-item>
            <a-asset-item id="pizzaModel" src="gltf/pizza.gltf"></a-asset-item>
            <a-asset-item id="coffeeModel" src="gltf/coffee.gltf"></a-asset-item>
        </a-assets>
        
        <a-marker id="hiroMarker" preset="hiro">
            
            <a-entity id="dishModel" position="0 0 0">
                <!-- Бургер модель -->
                <a-entity id="burgerEntity" 
                    gltf-model="#burgerModel" 
                    scale="0.8 0.8 0.8" 
                    position="0 0.3 0"
                    rotation="0 0 0"
                    visible="true">
                </a-entity>
                
                <!-- Пицца модель -->
                <a-entity id="pizzaEntity" 
                    gltf-model="#pizzaModel" 
                    scale="0.8 0.8 0.8" 
                    position="0 0.2 0"
                    rotation="0 0 0"
                    visible="false">
                </a-entity>
                
                <!-- Кофе модель -->
                <a-entity id="coffeeEntity" 
                    gltf-model="#coffeeModel" 
                    scale="0.8 0.8 0.8" 
                    position="0 0.2 0"
                    rotation="0 0 0"
                    visible="false">
                </a-entity>
            </a-entity>

            <a-text id="dishText" value="🍔 Бургер" position="0 -0.5 0" color="white" scale="0.8 0.8 0.8" align="center" background="true" background-color="black" background-padding="0.2"></a-text>
        </a-marker>

        <a-entity id="pinnedGroup" position="0 0 0" visible="false">
            <a-entity id="pinnedModel" position="0 0 0"></a-entity>
            <a-text id="pinnedText" value="" position="0 -0.5 0" color="white" scale="0.8 0.8 0.8" align="center" background="true" background-color="black" background-padding="0.2"></a-text>
        </a-entity>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const dishes = {
            burger: { 
                name: "🍔 Чизбургер", 
                calories: "520", 
                protein: "28", 
                fat: "26", 
                carbs: "42", 
                ingredients: "Говяжья котлета 150г, сыр чеддер, салат айсберг, помидор, маринованные огурцы, соус BBQ, булка с кунжутом",
                modelId: "burgerEntity"
            },
            pizza: { 
                name: "🍕 Пицца Маргарита", 
                calories: "680", 
                protein: "24", 
                fat: "28", 
                carbs: "75", 
                ingredients: "Томатный соус, моцарелла, свежие томаты, базилик, оливковое масло, тесто на закваске",
                modelId: "pizzaEntity"
            },
            coffee: { 
                name: "☕ Латте", 
                calories: "180", 
                protein: "8", 
                fat: "9", 
                carbs: "14", 
                ingredients: "Эспрессо, вспененное молоко 3.2%, сироп (по желанию), корица",
                modelId: "coffeeEntity"
            }
        };

        const dishNameEl = document.getElementById('dishName');
        const caloriesEl = document.getElementById('calories');
        const macroEl = document.getElementById('macro');
        const ingredientsEl = document.getElementById('ingredients');
        const menuPanel = document.getElementById('menuPanel');
        const toggleBtn = document.getElementById('toggleMenuBtn');
        const pinBtn = document.getElementById('pinObjectBtn');
        const hiroMarker = document.getElementById('hiroMarker');
        const pinnedGroup = document.getElementById('pinnedGroup');
        const dishText = document.getElementById('dishText');
        const pinnedText = document.getElementById('pinnedText');
        const warningMsg = document.getElementById('warningMsg');

        const models = {
            burger: document.getElementById('burgerEntity'),
            pizza: document.getElementById('pizzaEntity'),
            coffee: document.getElementById('coffeeEntity')
        };

        let currentDish = 'burger';
        let isPinned = false;
        let isDragging = false;
        let lastTouchX = 0;
        let lastTouchY = 0;
        let markerDetected = false;

        function showMessage(text, isTemp = true) {
            warningMsg.textContent = text;
            warningMsg.style.opacity = '1';
            if (isTemp) {
                setTimeout(() => {
                    if (warningMsg.textContent === text) {
                        warningMsg.style.opacity = '0.7';
                    }
                }, 3000);
            }
        }

        function selectDish(dishId) {
            currentDish = dishId;
            const dish = dishes[dishId];
            if (!dish) return;

            dishNameEl.textContent = dish.name;
            caloriesEl.innerHTML = `${dish.calories} <span>ккал</span>`;
            macroEl.innerHTML = `<div>🥩 Б: ${dish.protein}г</div><div>🧈 Ж: ${dish.fat}г</div><div>🍚 У: ${dish.carbs}г</div>`;
            ingredientsEl.textContent = `Состав: ${dish.ingredients}`;
            
            dishText.setAttribute('value', dish.name);
            
            for (let key in models) {
                if (models[key]) models[key].setAttribute('visible', 'false');
            }
            if (models[dishId]) models[dishId].setAttribute('visible', 'true');
            
            document.querySelectorAll('.menu-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.dish === dishId) btn.classList.add('active');
            });
            
            showMessage(`🍽️ Выбрано: ${dish.name}`, true);
        }

        function isTouchOnUI(touchX, touchY) {
            const elements = document.elementsFromPoint(touchX, touchY);
            for (let el of elements) {
                if (el.classList && (
                    el.classList.contains('menu-btn') ||
                    el.classList.contains('toggle-menu-btn') ||
                    el.classList.contains('pin-object-btn') ||
                    el.closest('.menu-panel')
                )) {
                    return true;
                }
            }
            return false;
        }

        function startDrag(e) {
            const touch = e.touches[0];
            if (isTouchOnUI(touch.clientX, touch.clientY)) {
                return;
            }
            isDragging = true;
            lastTouchX = touch.clientX;
            lastTouchY = touch.clientY;
            e.preventDefault();
        }

        function onDrag(e) {
            if (!isDragging) return;
            const touch = e.touches[0];
            const deltaX = (touch.clientX - lastTouchX) * 0.005;
            const deltaY = (touch.clientY - lastTouchY) * 0.005;
            
            if (isPinned && pinnedGroup.getAttribute('visible') === 'true') {
                let pos = pinnedGroup.getAttribute('position');
                pinnedGroup.setAttribute('position', {
                    x: pos.x + deltaX,
                    y: pos.y - deltaY,
                    z: pos.z
                });
            } else if (hiroMarker.getAttribute('visible') === 'true') {
                let pos = hiroMarker.getAttribute('position');
                hiroMarker.setAttribute('position', {
                    x: pos.x + deltaX,
                    y: pos.y - deltaY,
                    z: pos.z
                });
            }
            
            lastTouchX = touch.clientX;
            lastTouchY = touch.clientY;
            e.preventDefault();
        }

        function endDrag(e) {
            isDragging = false;
        }

        function pinObject() {
            if (!isPinned) {
                const markerPosition = hiroMarker.object3D.position;
                const markerRotation = hiroMarker.object3D.rotation;
                
                const pinnedModelContainer = document.getElementById('pinnedModel');
                while (pinnedModelContainer.firstChild) {
                    pinnedModelContainer.removeChild(pinnedModelContainer.firstChild);
                }
                
                const currentModel = models[currentDish];
                if (currentModel) {
                    const clone = currentModel.cloneNode(true);
                    clone.setAttribute('visible', 'true');
                    pinnedModelContainer.appendChild(clone);
                }
                
                pinnedGroup.object3D.position.copy(markerPosition);
                pinnedGroup.object3D.rotation.copy(markerRotation);
                pinnedText.setAttribute('value', dishes[currentDish].name);
                
                pinnedGroup.setAttribute('visible', 'true');
                hiroMarker.setAttribute('visible', 'false');
                
                isPinned = true;
                pinBtn.textContent = '📍 Открепить';
                pinBtn.classList.add('pinned');
                showMessage('✅ Блюдо закреплено! Теперь можно убрать маркер.', true);
            } else {
                pinnedGroup.setAttribute('visible', 'false');
                hiroMarker.setAttribute('visible', 'true');
                isPinned = false;
                pinBtn.textContent = '📍 Закрепить';
                pinBtn.classList.remove('pinned');
                showMessage('📍 Режим маркера. Нажми "Закрепить", чтобы зафиксировать блюдо.', true);
            }
        }

        let menuHidden = false;
        toggleBtn.onclick = () => {
            menuHidden = !menuHidden;
            if (menuHidden) {
                menuPanel.classList.add('hidden');
                toggleBtn.innerHTML = '🙉 Показать меню';
                showMessage('📋 Меню скрыто', true);
            } else {
                menuPanel.classList.remove('hidden');
                toggleBtn.innerHTML = '🙈 Скрыть меню';
                showMessage('📋 Меню открыто', true);
            }
        };

        document.querySelectorAll('.menu-btn').forEach(btn => {
            btn.addEventListener('click', () => selectDish(btn.dataset.dish));
        });

        pinBtn.onclick = pinObject;
        selectDish('burger');
        
        document.addEventListener('touchstart', startDrag, { passive: false });
        document.addEventListener('touchmove', onDrag, { passive: false });
        document.addEventListener('touchend', endDrag);
        
        setInterval(() => {
            if (!isPinned && hiroMarker.object3D && pinnedGroup) {
                const pos = hiroMarker.object3D.position;
                const rot = hiroMarker.object3D.rotation;
                if (pos && (pos.x !== 0 || pos.y !== 0 || pos.z !== 0)) {
                    if (!markerDetected && (pos.x !== 0 || pos.z !== 0)) {
                        markerDetected = true;
                        showMessage('🎯 Маркер найден! Води пальцем, чтобы перемещать блюдо.', true);
                    }
                    pinnedGroup.object3D.position.copy(pos);
                    pinnedGroup.object3D.rotation.copy(rot);
                } else {
                    markerDetected = false;
                }
            }
        }, 100);
        
        setTimeout(() => {
            if (!markerDetected && !isPinned) {
                showMessage('🔍 Наведите камеру на чёрно-белый маркер Hiro', false);
            }
        }, 2000);
    </script>
</body>
</html>
